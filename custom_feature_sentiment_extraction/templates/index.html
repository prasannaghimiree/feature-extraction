<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSA AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --positive: #22c55e;
            --negative: #ef4444;
            --neutral: #f59e0b;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .input-group {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid #334155;
            color: white;
            font-size: 1.1rem;
            resize: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--accent-primary);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .results {
            margin-top: 40px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-primary);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }

        .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-positive {
            background: rgba(34, 197, 94, 0.2);
            color: var(--positive);
        }

        .badge-negative {
            background: rgba(239, 68, 68, 0.2);
            color: var(--negative);
        }

        .badge-neutral {
            background: rgba(245, 158, 11, 0.2);
            color: var(--neutral);
        }

        .confidence {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Feature Extraction and Semantic Analysis</h1>
        <div class="input-group">
            <textarea id="sentenceInput" rows="3"
                placeholder="Enter a sentence (e.g., 'The camera is great but battery is bad')"></textarea>
            <button onclick="analyze()">Analyze Sentiment & Features</button>
        </div>

        <div id="loader" class="loader"></div>

        <div id="results" class="results"></div>
    </div>

    <script>
        async function analyze() {
            const sentenceInput = document.getElementById('sentenceInput');
            const sentence = sentenceInput.value;
            if (!sentence) return;

            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');

            loader.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const response = await axios.post('/analyze', { sentence });
                const data = response.data;

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<p style="text-align:center; color: var(--text-secondary)">No aspects found in this sentence.</p>';
                } else {
                    data.results.forEach(res => {
                        const sentimentClass = res.sentiment.toLowerCase().includes('pos') ? 'badge-positive' :
                            (res.sentiment.toLowerCase().includes('neg') ? 'badge-negative' : 'badge-neutral');

                        const card = `
                            <div class="result-card">
                                <div class="result-row">
                                    <span class="label">Raw Aspect</span>
                                    <span class="value" style="color: var(--accent-primary)">${res.aspect}</span>
                                </div>
                                <div class="result-row">
                                    <span class="label">Predicted Feature</span>
                                    <span class="value">${res.feature} <span class="confidence">(${Math.round(res.feature_confidence * 100)}%)</span></span>
                                </div>
                                <div class="result-row">
                                    <span class="label">Sentiment</span>
                                    <span class="badge ${sentimentClass}">${res.sentiment}</span>
                                    <span class="confidence" style="margin-left: auto">${Math.round(res.sentiment_confidence * 100)}%</span>
                                </div>
                            </div>
                        `;
                        resultsDiv.innerHTML += card;
                    });
                }
            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = '<p style="color: var(--negative); text-align:center">Error analyzing sentence.</p>';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>

</html>
